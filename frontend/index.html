<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HidConverter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>HidConverter</h1>
            <p class="subtitle">Универсальный конвертер файлов</p>
        </header>

        <div class="drop-zone" id="dropZone">
            <div class="drop-zone-content" id="dropContent">
                <svg class="upload-icon" viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <p class="drop-text">Перетащите файл сюда</p>
                <p class="drop-hint">или нажмите для выбора</p>
                <input type="file" id="fileInput" hidden>
            </div>
            <div class="file-info" id="fileInfo" style="display:none;">
                <div class="file-icon">
                    <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                    </svg>
                </div>
                <div class="file-details">
                    <span class="file-name" id="fileName"></span>
                    <span class="file-size" id="fileSize"></span>
                </div>
                <button class="btn-remove" id="removeFile" title="Удалить">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="controls" id="controls" style="display:none;">
            <div class="format-selector">
                <label for="formatSelect">Целевой формат:</label>
                <select id="formatSelect"></select>
            </div>
            <button class="btn-convert" id="convertBtn">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                </svg>
                Конвертировать
            </button>
        </div>

        <div class="progress-section" id="progressSection" style="display:none;">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <p class="progress-text" id="progressText">Обработка...</p>
        </div>

        <div class="result-section" id="resultSection" style="display:none;">
            <div class="result-success">
                <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="#4ade80" stroke-width="1.5">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
                <p>Конвертация завершена!</p>
            </div>
            <a class="btn-download" id="downloadBtn" download>
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Скачать
            </a>
            <button class="btn-reset" id="resetBtn">Конвертировать ещё</button>
        </div>
    </div>

    <div class="error-toast" id="errorToast">
        <span id="errorMessage"></span>
    </div>

    <script src="app.js"></script>
</body>
</html>
