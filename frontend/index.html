<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HidConverter</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>HidConverter</h1>
            <p class="subtitle">Универсальный конвертер файлов</p>
        </header>

        <div class="mode-tabs">
            <button class="mode-tab active" data-mode="convert">Конвертация</button>
            <button class="mode-tab" data-mode="hash">Хэши</button>
            <button class="mode-tab" data-mode="qr">QR-коды</button>
        </div>

        <!-- ===== CONVERT MODE ===== -->
        <div id="convertMode" class="mode-panel">
            <div class="drop-zone" id="dropZone">
                <div class="drop-zone-content" id="dropContent">
                    <svg class="upload-icon" viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    <p class="drop-text">Перетащите файлы сюда</p>
                    <p class="drop-hint">или нажмите для выбора (несколько файлов) &bull; Ctrl+V для вставки</p>
                    <input type="file" id="fileInput" multiple hidden>
                </div>
            </div>

            <div class="file-list" id="fileList" style="display:none;"></div>

            <div class="controls" id="controls" style="display:none;">
                <div class="format-selector">
                    <label for="formatSelect">Целевой формат:</label>
                    <select id="formatSelect"></select>
                </div>
                <button class="btn-convert" id="convertBtn">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                    </svg>
                    Конвертировать
                </button>
            </div>

            <div class="settings-panel" id="settingsPanel">
                <button class="settings-toggle" id="settingsToggle">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                    Дополнительные настройки
                </button>
                <div class="settings-body" id="settingsBody">
                    <div class="setting-row">
                        <label for="qualityRange">Качество: <span id="qualityValue">85</span>%</label>
                        <input type="range" id="qualityRange" min="1" max="100" value="85">
                    </div>
                    <div class="setting-row">
                        <label for="bitrateSelect">Битрейт аудио:</label>
                        <select id="bitrateSelect">
                            <option value="128k">128 kbps</option>
                            <option value="192k" selected>192 kbps</option>
                            <option value="256k">256 kbps</option>
                            <option value="320k">320 kbps</option>
                        </select>
                    </div>
                    <div class="setting-row checkbox-row">
                        <label class="checkbox-label">
                            <input type="checkbox" id="cleanMetaCheck" checked>
                            <span>Очистить метаданные (EXIF)</span>
                        </label>
                    </div>
                    <div class="setting-row">
                        <label for="urlInput">Скачать и конвертировать по ссылке (YouTube/Файл):</label>
                        <div class="url-input-group">
                            <input type="url" id="urlInput" class="url-field" placeholder="https://example.com/file.pdf">
                            <button class="btn-convert btn-url" id="convertUrlBtn">
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                    <polyline points="7 10 12 15 17 10"/>
                                    <line x1="12" y1="15" x2="12" y2="3"/>
                                </svg>
                                Скачать
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="progress-section" id="progressSection" style="display:none;">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p class="progress-text" id="progressText"></p>
            </div>

            <div class="result-section" id="resultSection" style="display:none;">
                <div class="result-success">
                    <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="#4ade80" stroke-width="1.5">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
                    </svg>
                    <p id="resultText">Конвертация завершена!</p>
                </div>
                <a class="btn-download" id="downloadBtn" download>
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    Скачать
                </a>
                <button class="btn-reset" id="resetBtn">Конвертировать ещё</button>
            </div>
        </div>

        <!-- ===== HASH MODE ===== -->
        <div id="hashMode" class="mode-panel" style="display:none;">
            <div class="hash-inputs">
                <textarea class="hash-textarea" id="hashText" placeholder="Введите текст для хэширования..."></textarea>
                <div class="hash-or">или</div>
                <div class="hash-file-zone" id="hashFileZone">
                    <input type="file" id="hashFileInput" hidden>
                    <span id="hashFileLabel">Выберите файл</span>
                </div>
            </div>
            <button class="btn-convert" id="hashBtn">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                </svg>
                Вычислить
            </button>

            <div class="hash-results" id="hashResults" style="display:none;">
                <div class="hash-result-item"><span class="hash-label">MD5</span><code class="hash-value" id="hashMd5">—</code></div>
                <div class="hash-result-item"><span class="hash-label">SHA-1</span><code class="hash-value" id="hashSha1">—</code></div>
                <div class="hash-result-item"><span class="hash-label">SHA-256</span><code class="hash-value" id="hashSha256">—</code></div>
            </div>
        </div>

        <!-- ===== QR MODE ===== -->
        <div id="qrMode" class="mode-panel" style="display:none;">
            <div class="qr-tabs">
                <button class="qr-tab active" data-qr-mode="encode">Создать QR</button>
                <button class="qr-tab" data-qr-mode="decode">Декодировать QR</button>
            </div>

            <div id="qrEncode" class="qr-subpanel">
                <div class="setting-row">
                    <label for="qrTextInput">Текст или URL для QR-кода:</label>
                    <textarea class="hash-textarea" id="qrTextInput" placeholder="Введите текст или URL..." rows="3"></textarea>
                </div>
                <div class="qr-format-row">
                    <label for="qrFormatSelect">Формат:</label>
                    <select id="qrFormatSelect" class="qr-format-select">
                        <option value="png">PNG</option>
                        <option value="svg">SVG</option>
                    </select>
                </div>
                <button class="btn-convert" id="qrEncodeBtn">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <rect x="7" y="7" width="3" height="3"/><rect x="14" y="7" width="3" height="3"/>
                        <rect x="7" y="14" width="3" height="3"/><rect x="14" y="14" width="3" height="3"/>
                    </svg>
                    Сгенерировать
                </button>
                <div class="qr-result-img" id="qrResultImg" style="display:none;">
                    <img id="qrImage" alt="QR Code">
                    <a class="btn-download" id="qrDownloadBtn" download>
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        Скачать
                    </a>
                </div>
            </div>

            <div id="qrDecode" class="qr-subpanel" style="display:none;">
                <div class="hash-file-zone" id="qrFileZone">
                    <input type="file" id="qrFileInput" accept="image/*" hidden>
                    <span id="qrFileLabel">Загрузите изображение с QR-кодом</span>
                </div>
                <button class="btn-convert" id="qrDecodeBtn">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                    </svg>
                    Декодировать
                </button>
                <div class="qr-decode-result" id="qrDecodeResult" style="display:none;">
                    <label>Результат:</label>
                    <textarea class="hash-textarea" id="qrDecodedText" readonly rows="3"></textarea>
                </div>
            </div>
        </div>
    </div>

    <div class="error-toast" id="errorToast">
        <span id="errorMessage"></span>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
